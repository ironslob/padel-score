name: PadelScore
options:
  bundleIdPrefix: com.matthewwilson.padelscore
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  createIntermediateGroups: true
  groupSortPosition: top
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Config/Signing.xcconfig
  Release: Config/Signing.xcconfig
settings:
  SWIFT_VERSION: "5.0"
targets:
  PadelScore:
    type: application
    platform: iOS
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    sources:
      - path: iPhone/PadelScore
      - path: shared
        excludes:
          - "**/*Tests*"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.matthewwilson.padelscore
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: Padel Score
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
      INFOPLIST_KEY_NSSupportsLiveActivities: YES
      CODE_SIGN_ENTITLEMENTS: iPhone/PadelScore/PadelScore.entitlements
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: "1.0"
      SUPPORTS_MACCATALYST: NO
      TARGETED_DEVICE_FAMILY: "1"
    capabilities:
      App Groups:
        enabled: true
        groups:
          - group.com.matthewwilson.padelscore
    dependencies:
      - target: PadelScoreWatch
        embed: true
      - target: PadelScoreLiveActivity
        embed: true
    scheme:
      testTargets:
        - PadelScoreTests

  PadelScoreLiveActivity:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    sources:
      - path: iPhone/PadelScoreLiveActivity
        excludes:
          - Info.plist
      - path: shared
        excludes:
          - "**/*Tests*"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.matthewwilson.padelscore.liveactivity
      GENERATE_INFOPLIST_FILE: NO
      INFOPLIST_FILE: iPhone/PadelScoreLiveActivity/Info.plist
      CODE_SIGN_ENTITLEMENTS: iPhone/PadelScoreLiveActivity/PadelScoreLiveActivity.entitlements
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: "1.0"
      TARGETED_DEVICE_FAMILY: "1"
    capabilities:
      App Groups:
        enabled: true
        groups:
          - group.com.matthewwilson.padelscore
    scheme: {}

  PadelScoreWatch:
    type: application
    platform: watchOS
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    sources:
      - path: watch/PadelScoreWatch
      - path: shared
        excludes:
          - "**/*Tests*"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.matthewwilson.padelscore.watchkitapp
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_CFBundleDisplayName: Padel Score
      INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.matthewwilson.padelscore
      INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: YES
      INFOPLIST_KEY_WKSupportsAlwaysOnDisplay: YES
      INFOPLIST_KEY_WKBackgroundModes:
        - workout-processing
      INFOPLIST_KEY_NSHealthShareUsageDescription: Padel Score reads workout data when you choose to track a match as a workout.
      INFOPLIST_KEY_NSHealthUpdateUsageDescription: Padel Score saves workout duration when you track a match as a workout.
      INFOPLIST_KEY_SupportsLaunchForLiveActivityAttributeTypes:
        - MatchActivityAttributes
      CODE_SIGN_ENTITLEMENTS: watch/PadelScoreWatch/PadelScoreWatch.entitlements
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: "1.0"
      TARGETED_DEVICE_FAMILY: "4"
      SDKROOT: watchos
      SUPPORTED_PLATFORMS: "watchos watchsimulator"
    dependencies:
      - target: PadelScoreComplications
        embed: true
    capabilities:
      App Groups:
        enabled: true
        groups:
          - group.com.matthewwilson.padelscore
      HealthKit:
        enabled: true
    scheme: {}

  PadelScoreComplications:
    type: app-extension
    platform: watchOS
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    sources:
      - path: watch/PadelScoreComplications
        excludes:
          - Info.plist
      - path: shared
        excludes:
          - "**/*Tests*"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.matthewwilson.padelscore.watchkitapp.complications
      GENERATE_INFOPLIST_FILE: NO
      INFOPLIST_FILE: watch/PadelScoreComplications/Info.plist
      CODE_SIGN_ENTITLEMENTS: watch/PadelScoreComplications/PadelScoreComplications.entitlements
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: "1.0"
      TARGETED_DEVICE_FAMILY: "4"
      SDKROOT: watchos
      SUPPORTED_PLATFORMS: "watchos watchsimulator"
    capabilities:
      App Groups:
        enabled: true
        groups:
          - group.com.matthewwilson.padelscore
    scheme: {}

  PadelScoreTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    sources:
      - path: tests/Unit
      - path: shared
        excludes:
          - "**/*Tests*"
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.matthewwilson.padelscore.tests
      TARGETED_DEVICE_FAMILY: "1"
      # Hostless unit tests — shared sources compiled into the test bundle.
      TEST_HOST: ""
      BUNDLE_LOADER: ""

schemes:
  PadelScore:
    build:
      targets:
        PadelScoreWatch: [all]
        PadelScore: [all]
        PadelScoreTests: [test]
    test:
      targets:
        - PadelScoreTests
  PadelScoreWatch:
    build:
      targets:
        PadelScoreWatch: [all]
  PadelScoreTests:
    build:
      targets:
        PadelScoreTests: [build, test]
    test:
      targets:
        - PadelScoreTests
      gatherCoverageData: false
